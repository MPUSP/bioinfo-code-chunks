name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0
        with:
          # add separate env for each test
          environments: >-
            circlize
          cache: true

      - name: test-circlize
        run: pixi run -e circlize test-circlize
